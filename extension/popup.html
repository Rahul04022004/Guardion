<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardion</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 480px;
      font-family: 'Poppins', -apple-system, sans-serif;
      background: #09090b;
      color: #e4e4e7;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      position: relative;
      padding: 24px 20px 20px;
      text-align: center;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -60%;
      left: -20%;
      width: 140%;
      height: 200%;
      background: radial-gradient(ellipse at center top, rgba(249,115,22,0.12) 0%, transparent 60%);
      pointer-events: none;
    }
    .header-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
    }
    .header-brand svg {
      width: 28px;
      height: 28px;
      color: #f97316;
      filter: drop-shadow(0 0 8px rgba(249,115,22,0.4));
    }
    .header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #f97316, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      font-size: 11px;
      color: #71717a;
      margin-top: 4px;
      position: relative;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      position: relative;
    }
    .status-active {
      background: rgba(34,197,94,0.1);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2);
      box-shadow: 0 0 12px rgba(34,197,94,0.1);
    }
    .status-inactive {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 16px;
    }
    .stat-card {
      background: #18181b;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      border: 1px solid #27272a;
      transition: border-color 0.2s;
    }
    .stat-card:hover {
      border-color: #3f3f46;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      color: #71717a;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .text-cyan { color: #06b6d4; }
    .text-green { color: #22c55e; }
    .text-orange { color: #f97316; }
    .text-red { color: #ef4444; }

    /* ── Threat Meter ── */
    .threat-section {
      padding: 14px 16px;
    }
    .threat-meter {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 10px;
      padding: 14px;
    }
    .threat-meter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .threat-meter-label {
      font-size: 11px;
      font-weight: 600;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .threat-meter-value {
      font-size: 13px;
      font-weight: 700;
    }
    .threat-bar-bg {
      width: 100%;
      height: 6px;
      background: #27272a;
      border-radius: 3px;
      overflow: hidden;
    }
    .threat-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .threat-categories {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 10px;
    }
    .threat-tag {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(249,115,22,0.1);
      color: #f97316;
      border: 1px solid rgba(249,115,22,0.15);
    }

    /* ── Section ── */
    .section {
      padding: 0 16px 12px;
    }
    .section h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #52525b;
      margin-bottom: 8px;
      font-weight: 700;
    }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #18181b;
      padding: 11px 14px;
      border-radius: 8px;
      margin-bottom: 6px;
      border: 1px solid #27272a;
    }
    .toggle-label {
      font-size: 12px;
      font-weight: 500;
    }
    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #3f3f46;
      border-radius: 22px;
      transition: 0.3s;
    }
    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .toggle-slider {
      background: #f97316;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(18px);
    }

    /* ── Button ── */
    .btn-dashboard {
      display: block;
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s;
      box-shadow: 0 0 16px rgba(249,115,22,0.15);
    }
    .btn-dashboard:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(249,115,22,0.25);
    }

    .footer {
      text-align: center;
      padding: 12px;
      font-size: 9px;
      color: #3f3f46;
      font-weight: 500;
    }
    .footer span { color: #f97316; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <h1>GUARDION</h1>
    </div>
    <p>AI Prompt Security Engine</p>
    <span id="statusBadge" class="status-badge status-active">
      <span class="status-dot"></span> Protected
    </span>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value text-cyan" id="totalCount">0</div>
      <div class="stat-label">Scanned</div>
    </div>
    <div class="stat-card">
      <div class="stat-value text-green" id="allowedCount">0</div>
      <div class="stat-label">Allowed</div>
    </div>
    <div class="stat-card">
      <div class="stat-value text-orange" id="warnedCount">0</div>
      <div class="stat-label">Warnings</div>
    </div>
    <div class="stat-card">
      <div class="stat-value text-red" id="blockedCount">0</div>
      <div class="stat-label">Blocked</div>
    </div>
  </div>

  <!-- Threat Meter -->
  <div class="threat-section">
    <div class="threat-meter">
      <div class="threat-meter-header">
        <span class="threat-meter-label">Threat Level</span>
        <span class="threat-meter-value" id="threatLevel" style="color: #22c55e;">Low</span>
      </div>
      <div class="threat-bar-bg">
        <div class="threat-bar-fill" id="threatBar" style="width: 10%; background: #22c55e;"></div>
      </div>
      <div class="threat-categories" id="threatCategories"></div>
    </div>
  </div>

  <!-- Settings -->
  <div class="section">
    <h3>Settings</h3>
    <div class="toggle-row">
      <span class="toggle-label">Enable Protection</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggleProtection" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Auto-Sanitize</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggleSanitize">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Show AI Fix Suggestions</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggleAiFix" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Dashboard Link -->
  <div class="section">
    <a href="http://localhost:5173" target="_blank" class="btn-dashboard">
      Open Security Dashboard ↗
    </a>
  </div>

  <div class="footer">
    Guardion v2.0 — Powered by <span>OWASP + AI</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
