<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 0;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .header p {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 4px;
    }

    .status-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-active {
      background: rgba(16, 185, 129, 0.2);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status-inactive {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px;
    }

    .stat-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      border: 1px solid #334155;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .text-blue { color: #60a5fa; }
    .text-green { color: #34d399; }
    .text-yellow { color: #fbbf24; }
    .text-red { color: #f87171; }

    /* ── Section ── */
    .section {
      padding: 0 16px 16px;
    }

    .section h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 10px;
    }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1e293b;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid #334155;
    }

    .toggle-label {
      font-size: 13px;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #475569;
      border-radius: 24px;
      transition: 0.3s;
    }

    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .toggle-slider {
      background: #3b82f6;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    /* ── Button ── */
    .btn-dashboard {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-dashboard:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    .footer {
      text-align: center;
      padding: 12px;
      font-size: 10px;
      color: #475569;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🛡️ GUARDION</h1>
    <p>AI Prompt Security Engine</p>
    <span id="statusBadge" class="status-badge status-active">● Protected</span>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value text-blue" id="totalCount">0</div>
      <div class="stat-label">Prompts Scanned</div>
    </div>
    <div class="stat-card">
      <div class="stat-value text-green" id="allowedCount">0</div>
      <div class="stat-label">Allowed</div>
    </div>
    <div class="stat-card">
      <div class="stat-value text-yellow" id="warnedCount">0</div>
      <div class="stat-label">Warnings</div>
    </div>
    <div class="stat-card">
      <div class="stat-value text-red" id="blockedCount">0</div>
      <div class="stat-label">Blocked</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="section">
    <h3>Settings</h3>

    <div class="toggle-row">
      <span class="toggle-label">Enable Protection</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggleProtection" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Auto-Sanitize</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggleSanitize">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Dashboard Link -->
  <div class="section">
    <a href="http://localhost:5173" target="_blank" class="btn-dashboard">
      Open Security Dashboard ↗
    </a>
  </div>

  <div class="footer">
    Guardion v1.0.0 — Hackathon Edition
  </div>

  <script src="popup.js"></script>
</body>
</html>
